name: CI

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:

jobs:
  check-version-bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure VERSION exists
        run: test -f VERSION

      - name: Validate VERSION format
        run: grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' VERSION

      - name: Ensure VERSION changed in pull request
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "${{ github.base_ref }}:refs/remotes/origin/pr-base"
          changed_files="$(git diff --name-only refs/remotes/origin/pr-base...HEAD)"
          version_required="$(printf '%s\n' "$changed_files" | grep -qvE '^(\.github/|README\.md$|VERSION$)' && echo yes || echo no)"
          if [ "$version_required" = "yes" ] && ! printf '%s\n' "$changed_files" | grep -qx 'VERSION'; then
            echo "VERSION must be updated in this pull request" >&2
            exit 1
          fi

  go-build-vet:
    runs-on: ubuntu-latest
    needs: check-version-bump
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...
